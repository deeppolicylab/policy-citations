<style>
:root{
  --ink:#121A30;
  --ink-card:#1B2747;
  --ink-card-2:#202E54;
  --hairline:rgba(212,162,76,0.22);
  --gold:#D4A24C;
  --teal:#3FA092;
  --brick:#C1654A;
  --muted:#93A0C2;
  --paper:#F4F0E6;
  --display:'Fraunces', Georgia, serif;
  --body:'Inter', -apple-system, sans-serif;
  --mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--ink); color:var(--paper);
  font-family:var(--body); -webkit-font-smoothing:antialiased;
}
a{color:var(--gold);}
a:hover{color:var(--teal);}

/* ---- Header / masthead ---- */
.masthead{
  border-bottom:1px solid var(--hairline);
  padding:28px clamp(20px,5vw,56px) 0;
  position:relative;
}
.masthead-top{
  display:flex; justify-content:space-between; align-items:flex-start; gap:24px;
  flex-wrap:wrap;
}
.eyebrow{
  font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--gold); margin:0 0 10px;
}
h1.title{
  font-family:var(--display); font-weight:600; font-size:clamp(28px,3.4vw,42px);
  margin:0 0 6px; letter-spacing:-0.01em;
}
.subtitle{ color:var(--muted); font-size:15px; margin:0 0 22px; max-width:640px;}
.masthead-meta{
  font-family:var(--mono); font-size:11px; color:var(--muted); text-align:right;
  line-height:1.6;
}
.masthead-meta b{ color:var(--paper); }

/* ---- Tabs ---- */
.tabs{
  display:flex; gap:2px; margin-top:6px; overflow-x:auto;
}
.tab-btn{
  font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  background:none; border:none; color:var(--muted); padding:12px 18px;
  cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
  transition:color .15s, border-color .15s;
}
.tab-btn:hover{ color:var(--paper); }
.tab-btn.active{ color:var(--gold); border-bottom-color:var(--gold); }

main{ padding:28px clamp(20px,5vw,56px) 64px; max-width:1320px; margin:0 auto; }
.page{ display:none; }
.page.active{ display:block; animation:fade .25s ease; }
@keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

/* ---- Grid / cards ---- */
.row{ display:grid; gap:16px; margin-bottom:16px; }
.row.cols-4{ grid-template-columns:repeat(4,1fr); }
.row.cols-2-60-40{ grid-template-columns:60% 1fr; }
.row.cols-2-55-45{ grid-template-columns:55% 1fr; }
.row.cols-2-38-62{ grid-template-columns:38% 1fr; }
@media (max-width:880px){
  .row.cols-4{ grid-template-columns:repeat(2,1fr); }
  .row.cols-2-60-40, .row.cols-2-55-45, .row.cols-2-38-62{ grid-template-columns:1fr; }
}

.card{
  background:var(--ink-card); border:1px solid var(--hairline); border-radius:3px;
  overflow:hidden;
}
.card-head{
  font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted); padding:13px 16px 11px; border-bottom:1px solid var(--hairline);
}
.card-body{ padding:14px 16px; }
.card-body.tight{ padding:6px 10px; }

/* ---- Value boxes ---- */
.vbox{ padding:18px 18px 16px; position:relative; }
.vbox .icon{ position:absolute; top:16px; right:16px; opacity:.35; font-size:20px; }
.vbox .vlabel{
  font-family:var(--mono); font-size:11px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted);
}
.vbox .vvalue{
  font-family:var(--display); font-weight:600; font-size:2.3rem; margin-top:6px; line-height:1;
}
.vbox.gold{ border-left:3px solid var(--gold); }
.vbox.teal{ border-left:3px solid var(--teal); }
.vbox.brick{ border-left:3px solid var(--brick); }
.vbox.muted2{ border-left:3px solid var(--muted); }

/* ---- Tables ---- */
table{ width:100%; border-collapse:collapse; font-size:13.5px; }
thead th{
  font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase;
  color:var(--muted); text-align:left; padding:9px 10px; border-bottom:1px solid var(--hairline);
  position:sticky; top:0; background:var(--ink-card);
}
tbody td{ padding:9px 10px; border-bottom:1px solid rgba(255,255,255,0.06); vertical-align:top; }
tbody tr:hover{ background:rgba(255,255,255,0.025); }
.scroll-table{ max-height:420px; overflow-y:auto; }
.mono{ font-family:var(--mono); font-size:12px; color:var(--muted); }
.num{ font-family:var(--mono); text-align:right; color:var(--paper); }
.rank{ font-family:var(--mono); color:var(--gold); width:34px; }

.seal{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:7px; }
.seal.gold{ background:var(--gold); } .seal.teal{ background:var(--teal); }
.seal.brick{ background:var(--brick); } .seal.muted2{ background:var(--muted); }

.legend{ display:flex; gap:16px; flex-wrap:wrap; padding:10px 16px 4px; font-size:12px; color:var(--muted); }
.legend span{ display:inline-flex; align-items:center; }

.foot-note{
  font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:6px; padding:0 2px;
}
.plot{ width:100%; }
</style>
</head>

<script>(function(){
  // Guard against the host page re-running this script against an
  // already-built DOM (some embedded preview panes re-execute inline
  // scripts on resize/remount) — without this, every chart gets drawn
  // again on top of itself.
  if (window.__policyImpactRegisterInit) return;
  window.__policyImpactRegisterInit = true;

  const DATA = JSON.parse(document.getElementById('bundle-data').textContent);

  const COLORS = { gold: '#D4A24C', teal: '#3FA092', brick: '#C1654A', muted: '#93A0C2' };
  const TYPE_COLOR = { 'think tank': 'gold', igo: 'teal', government: 'brick', other: 'muted2' };
  const TYPE_HEX   = { 'think tank': COLORS.gold, igo: COLORS.teal, government: COLORS.brick, other: COLORS.muted };

  function truncate(s, n){
    if (!s) return s;
    return s.length > n ? s.slice(0, n - 1).trimEnd() + '…' : s;
  }

  // ---------------- Plotly base layout ----------------
  const baseLayout = (extra) => Object.assign({
    paper_bgcolor: '#1B2747',
    plot_bgcolor: '#1B2747',
    showlegend: false,
    font: { family: 'Inter, sans-serif', color: '#F4F0E6', size: 12 },
    margin: { l: 10, r: 14, t: 10, b: 30 },
    xaxis: { title: '', gridcolor: 'rgba(255,255,255,0.07)', zerolinecolor: 'rgba(255,255,255,0.07)', automargin: true },
    yaxis: { title: '', gridcolor: 'rgba(255,255,255,0.07)', zerolinecolor: 'rgba(255,255,255,0.07)', automargin: true },
  }, extra);
  const plotConfig = { displayModeBar: false, responsive: true };

  // Always clear any prior render on this div before drawing — cheap
  // insurance against double-initialization on top of the guard above.
  function drawPlot(id, traces, layoutExtra){
    const el = document.getElementById(id);
    if (!el) return;
    if (el.dataset.plotted) { try { Plotly.purge(el); } catch(e){} }
    Plotly.newPlot(id, traces, baseLayout(layoutExtra), plotConfig);
    el.dataset.plotted = '1';
  }

  // ---------------- Masthead meta ----------------
  document.getElementById('meta-block').innerHTML =
    `<div><b>${DATA.summary.total}</b> mentions logged</div>
     <div>${DATA.summary.orgs} organizations · ${DATA.summary.countries} countries/IGOs</div>`;

  // ---------------- Page definitions ----------------
  const PAGES = [
    { id: 'overview', label: 'Overview' },
    { id: 'papers', label: 'By Paper' },
    { id: 'orgs', label: 'By Organization' },
    { id: 'topics', label: 'Topics & Reach' },
  ];

  const tabsEl = document.getElementById('tabs');
  const pagesEl = document.getElementById('pages');
  tabsEl.innerHTML = '';
  pagesEl.innerHTML = '';

  PAGES.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = p.label;
    btn.dataset.target = p.id;
    btn.addEventListener('click', () => showPage(p.id));
    tabsEl.appendChild(btn);

    const sec = document.createElement('section');
    sec.className = 'page' + (i === 0 ? ' active' : '');
    sec.id = 'page-' + p.id;
    pagesEl.appendChild(sec);
  });

  const rendered = {};
  function showPage(id){
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.target === id));
    document.querySelectorAll('.page').forEach(s => s.classList.toggle('active', s.id === 'page-' + id));
    if (!rendered[id]){ BUILDERS[id](); rendered[id] = true; }
    else { window.dispatchEvent(new Event('resize')); }
  }

  // ====================================================================
  // OVERVIEW
  // ====================================================================
  function buildOverview(){
    const root = document.getElementById('page-overview');

    const vb = (label, value, cls, icon) => `
      <div class="card vbox ${cls}">
        <div class="vlabel">${label}</div>
        <div class="vvalue">${value}</div>
        <div class="icon">${icon}</div>
      </div>`;

    root.innerHTML = `
      <div class="row cols-4">
        ${vb('Policy Mentions', DATA.summary.total, 'gold', '📄')}
        ${vb('Citing Organizations', DATA.summary.orgs, 'teal', '🏛')}
        ${vb('Countries & IGOs Reached', DATA.summary.countries, 'brick', '🌐')}
        ${vb('Papers With Policy Reach', DATA.summary.papers, 'muted2', '📚')}
      </div>
      <div class="row cols-2-38-62">
        <div class="card">
          <div class="card-head">Mentions by source type</div>
          <div class="card-body"><div id="chart-type" class="plot"></div></div>
        </div>
        <div class="card">
          <div class="card-head">Mentions by country / IGO</div>
          <div class="card-body"><div id="chart-country" class="plot"></div></div>
        </div>
      </div>
      <div class="row">
        <div class="card">
          <div class="card-head">Top citing organizations</div>
          <div class="card-body"><div id="chart-top-orgs" class="plot"></div></div>
        </div>
      </div>`;

    drawPlot('chart-type',
      [{
        type: 'pie', hole: 0.55,
        labels: DATA.types.map(t => t.source_type),
        values: DATA.types.map(t => t.citations),
        marker: { colors: DATA.types.map(t => TYPE_HEX[t.source_type] || COLORS.muted), line: { color: '#1B2747', width: 2 } },
        textinfo: 'label+value', textposition: 'outside', textfont: { size: 11 },
        showlegend: false,
      }],
      { height: 300, margin: { l: 30, r: 30, t: 30, b: 30 } });

    const ctop = DATA.countries.slice(0, 12).slice().reverse();
    drawPlot('chart-country',
      [{ type: 'bar', orientation: 'h',
         x: ctop.map(c => c.citations), y: ctop.map(c => truncate(c.country, 22)),
         hovertext: ctop.map(c => c.country), hoverinfo: 'text+x',
         marker: { color: COLORS.gold } }],
      { height: 300 });

    const otop = DATA.orgs.slice(0, 12).slice().reverse();
    const groups = {};
    otop.forEach(o => { (groups[o.source_type] = groups[o.source_type] || []).push(o); });
    const traces = Object.keys(groups).map(st => ({
      type: 'bar', orientation: 'h', name: st,
      x: otop.map(o => o.source_type === st ? o.citations : 0),
      y: otop.map(o => truncate(o.org, 30)),
      hovertext: otop.map(o => o.org), hoverinfo: 'text+x',
      marker: { color: TYPE_HEX[st] || COLORS.muted },
    }));
    drawPlot('chart-top-orgs', traces,
      { height: 360, barmode: 'stack', showlegend: true,
        legend: { orientation: 'h', y: 1.1, font: { size: 11 } },
        margin: { l: 10, r: 14, t: 36, b: 30 } });
  }

  // ====================================================================
  // BY PAPER
  // ====================================================================
  function buildPapers(){
    const root = document.getElementById('page-papers');
    root.innerHTML = `
      <div class="row">
        <div class="card">
          <div class="card-head">Citations per paper</div>
          <div class="card-body"><div id="chart-papers" class="plot"></div></div>
        </div>
      </div>
      <div class="row">
        <div class="card">
          <div class="card-head">Paper registry — ranked by policy citations</div>
          <div class="card-body tight scroll-table"><table id="table-papers"></table></div>
        </div>
      </div>`;

    const tp = DATA.top_papers.slice().reverse();
    drawPlot('chart-papers',
      [{ type: 'bar', orientation: 'h',
         x: tp.map(p => p.citations), y: tp.map(p => truncate(p.paper, 60)),
         hovertext: tp.map(p => p.paper), hoverinfo: 'text+x',
         marker: { color: COLORS.gold } }],
      { height: 460, margin: { l: 10, r: 14, t: 10, b: 30 } });

    const rows = DATA.top_papers.map((p, i) => `
      <tr>
        <td class="rank">${String(i + 1).padStart(2, '0')}</td>
        <td>${p.paper}</td>
        <td class="mono">${p.doi ? `<a href="https://doi.org/${p.doi}" target="_blank" rel="noopener">${p.doi}</a>` : '—'}</td>
        <td class="num">${p.citations}</td>
      </tr>`).join('');
    document.getElementById('table-papers').innerHTML = `
      <thead><tr><th>No.</th><th>Cited paper</th><th>DOI</th><th>Citations</th></tr></thead>
      <tbody>${rows}</tbody>`;
  }

  // ====================================================================
  // BY ORGANIZATION
  // ====================================================================
  function buildOrgs(){
    const root = document.getElementById('page-orgs');
    root.innerHTML = `
      <div class="row cols-2-55-45">
        <div class="card">
          <div class="card-head">Reach by organization (top 15)</div>
          <div class="card-body"><div id="chart-orgs" class="plot"></div></div>
        </div>
        <div class="card">
          <div class="card-head">Organization type × citations</div>
          <div class="card-body"><div id="chart-treemap" class="plot"></div></div>
        </div>
      </div>
      <div class="row">
        <div class="card">
          <div class="card-head">Organization registry</div>
          <div class="legend">
            <span><span class="seal gold"></span>think tank</span>
            <span><span class="seal teal"></span>igo</span>
            <span><span class="seal brick"></span>government</span>
            <span><span class="seal muted2"></span>other</span>
          </div>
          <div class="card-body tight scroll-table"><table id="table-orgs"></table></div>
        </div>
      </div>`;

    const o15 = DATA.orgs.slice(0, 15).slice().reverse();
    const groups = {};
    o15.forEach(o => { (groups[o.source_type] = groups[o.source_type] || []).push(o); });
    const traces = Object.keys(groups).map(st => ({
      type: 'bar', orientation: 'h', name: st,
      x: o15.map(o => o.source_type === st ? o.citations : 0),
      y: o15.map(o => truncate(o.org, 30)),
      hovertext: o15.map(o => o.org), hoverinfo: 'text+x',
      marker: { color: TYPE_HEX[st] || COLORS.muted },
    }));
    drawPlot('chart-orgs', traces,
      { height: 440, barmode: 'stack', showlegend: false, margin: { l: 10, r: 14, t: 10, b: 30 } });

    const typeOrder = [...new Set(DATA.orgs.map(o => o.source_type))];
    const typeTotals = {};
    DATA.orgs.forEach(o => { typeTotals[o.source_type] = (typeTotals[o.source_type] || 0) + o.citations; });
    const grandTotal = Object.values(typeTotals).reduce((a, b) => a + b, 0);
    drawPlot('chart-treemap',
      [{
        type: 'treemap',
        ids:     ['root', ...typeOrder, ...DATA.orgs.map((o, i) => `org-${i}`)],
        labels:  ['All organizations', ...typeOrder, ...DATA.orgs.map(o => truncate(o.org, 24))],
        parents: ['', ...typeOrder.map(() => 'root'), ...DATA.orgs.map(o => o.source_type)],
        values:  [grandTotal, ...typeOrder.map(t => typeTotals[t]), ...DATA.orgs.map(o => o.citations)],
        hovertext: ['All organizations', ...typeOrder, ...DATA.orgs.map(o => o.org)],
        hoverinfo: 'text+value',
        marker: { colors: ['rgba(0,0,0,0)', ...typeOrder.map(t => TYPE_HEX[t] || COLORS.muted), ...DATA.orgs.map(o => TYPE_HEX[o.source_type] || COLORS.muted)] },
        textfont: { size: 11 },
        branchvalues: 'total',
      }],
      { height: 440, margin: { l: 4, r: 4, t: 10, b: 4 } });

    const rows = DATA.orgs.map(o => `
      <tr>
        <td><span class="seal ${TYPE_COLOR[o.source_type] || 'muted2'}"></span>${o.org}</td>
        <td>${o.country}</td>
        <td class="mono">${o.source_type}</td>
        <td class="num">${o.citations}</td>
        <td class="mono">${o.latest || '—'}</td>
        <td>${o.doc_url ? `<a href="${o.doc_url}" target="_blank" rel="noopener">link</a>` : '—'}</td>
      </tr>`).join('');
    document.getElementById('table-orgs').innerHTML = `
      <thead><tr><th>Organization</th><th>Country</th><th>Type</th><th>Citations</th><th>Most recent</th><th>Document</th></tr></thead>
      <tbody>${rows}</tbody>`;
  }

  // ====================================================================
  // TOPICS & REACH
  // ====================================================================
  function buildTopics(){
    const root = document.getElementById('page-topics');
    root.innerHTML = `
      <div class="row cols-2-55-45">
        <div class="card">
          <div class="card-head">Most-linked topics</div>
          <div class="card-body"><div id="chart-topics" class="plot"></div></div>
        </div>
        <div class="card">
          <div class="card-head">Policy mentions over time (by year)</div>
          <div class="card-body"><div id="chart-timeline" class="plot"></div></div>
        </div>
      </div>
      <div class="row">
        <div class="card">
          <div class="card-head">Mention type — policy citation vs. name mention</div>
          <div class="card-body"><div id="chart-mtype" class="plot"></div></div>
        </div>
      </div>`;

    const tt = DATA.topics.slice().reverse();
    drawPlot('chart-topics',
      [{ type: 'bar', orientation: 'h',
         x: tt.map(t => t.count), y: tt.map(t => truncate(t.topic, 30)),
         hovertext: tt.map(t => t.topic), hoverinfo: 'text+x',
         marker: { color: COLORS.teal } }],
      { height: 380 });

    drawPlot('chart-timeline',
      [{ type: 'scatter', mode: 'lines', fill: 'tozeroy',
         x: DATA.timeline.map(t => t.year), y: DATA.timeline.map(t => t.citations),
         line: { color: COLORS.gold }, fillcolor: 'rgba(212,162,76,0.18)' }],
      { height: 380, xaxis: { gridcolor: 'rgba(255,255,255,0.07)', automargin: true } });

    drawPlot('chart-mtype',
      [{ type: 'bar', orientation: 'h',
         x: DATA.mention_types.map(t => t.count), y: DATA.mention_types.map(t => t.type),
         marker: { color: DATA.mention_types.map(t => t.type === 'Policy citation' ? COLORS.gold : COLORS.muted) } }],
      { height: 180 });
  }

  const BUILDERS = { overview: buildOverview, papers: buildPapers, orgs: buildOrgs, topics: buildTopics };

  // Render the first page on load
  BUILDERS.overview();
  rendered.overview = true;

  window.addEventListener('resize', () => {
    document.querySelectorAll('.plot').forEach(el => { if (el.id && el.dataset.plotted) Plotly.Plots.resize(el); });
  });
})();
</script>
